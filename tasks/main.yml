---
# tasks file for hostname
- name: Host name
  tags:
    - hostname
  when: not ansible_facts["virtualization_type"] | lower() in [ "lxc", "virtualpc" ]
  block:
    - name: Hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname_short }}"

    - name: Line in /etc/hosts
      ansible.builtin.lineinfile:
        dest: /etc/hosts
        regexp: ^[#\s]*127.0.1.1(\s+).*$
        line:
          127.0.1.1\g<1>{% if ansible_facts["domain"] is defined and ansible_facts["domain"] |
          length > 0 %}{{ ansible_facts["nodename"] }}.{{ ansible_facts["domain"] }} {% elif
          ansible_facts["dns"]['domain'] is defined and ansible_facts["dns"]['domain'] |
          length > 0 %}{{ ansible_facts["nodename"] }}.{{ ansible_facts["dns"]['domain'] }} {%
          endif %}{{ ansible_facts["nodename"] }}
        insertafter: 127.0.0.1\s+localhost
        backrefs: true
        backup: true
      when:
        - hostname_lo_fqdn is defined
        - hostname_lo_fqdn is true
      tags:
        - hosts

- name: Set hostname into root gecos field
  ansible.builtin.user:
    name: root
    comment: root@{{ inventory_hostname_short }}
  when:
    - hostname_root_gecos_field is defined
    - hostname_root_gecos_field
  tags:
    - hostname
    - gecos
    - user
